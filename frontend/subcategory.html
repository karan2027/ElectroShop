<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ElectroShop | Category</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="main-navbar">

  <!-- LEFT -->
  <div class="nav-left">
  <div class="profile-menu">
    <button type="button" class="profile-icon" onclick="handleProfileClick()">👤</button>

    <div id="profileDropdown" class="profile-dropdown">
      <a href="profile.html">👤 My Profile</a>
      <a href="orders.html">📦 My Orders</a>
      <a href="cart.html">🛒 My Cart</a>
      <button type="button" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="logo"> ElectroShop</div>
</div>

  <!-- CENTER -->
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="shop.html">Shop</a>
    <a href="compare.html">⚖️ Compare</a>
    <a href="orders.html" id="orders-link">My Orders 📦</a>
  </div>

  <div class="global-search">
  <input
    type="text"
    id="globalSearch"
    placeholder="Search products..."
    autocomplete="off"
    oninput="showSearchSuggestions()"
    onkeydown="searchOnEnter(event)"
  >
  <button onclick="handleSearch()">🔍</button>
  <div id="searchSuggestions" class="search-suggestions"></div>
</div>

  <!-- RIGHT -->
  <div class="nav-right">
  <a href="cart.html">🛒 <span id="cart-count">0</span></a>
</div>

</nav>

<!-- HERO -->
<section class="category-hero">
  <h1 id="subcategory-title">Explore Products</h1>
  <p>Find the best products by type and brand</p>
</section>

<!-- SLIDER -->
<section class="slider-section">
  <h2>Latest Products</h2>

  <div class="slider-container">
    <div id="slider-track" class="slider-track"></div>
  </div>
</section>

<!-- TYPES -->
<section class="home-section">
  <div class="section-header">
    <h2>Shop by Type</h2>
  </div>

  <div id="type-container" class="home-grid"></div>
</section>

<!-- BRANDS -->
<section class="home-section">
  <div class="section-header">
    <h2>Shop by Brand</h2>
  </div>

  <div id="brand-container" class="home-grid"></div>
</section>

<footer>
  <p>© 2026 ElectroShop</p>
</footer>

<script src="script.js"></script>
</body>
</html>
