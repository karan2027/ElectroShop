<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ElectroShop | Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="main-navbar">

  <!-- LEFT -->
  <div class="nav-left">
  <div class="profile-menu">
    <button type="button" class="profile-icon" onclick="handleProfileClick()">👤</button>

    <div id="profileDropdown" class="profile-dropdown">
      <a href="profile.html">👤 My Profile</a>
      <a href="orders.html">📦 My Orders</a>
      <a href="cart.html">🛒 My Cart</a>
      <button type="button" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="logo"> ElectroShop</div>
</div>

  <!-- CENTER -->
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="shop.html">Shop</a>
    <a href="compare.html">⚖️ Compare</a>
    <a href="orders.html" id="orders-link">My Orders 📦</a>
  </div>

  <div class="global-search">
  <input
    type="text"
    id="globalSearch"
    placeholder="Search products..."
    autocomplete="off"
    oninput="showSearchSuggestions()"
    onkeydown="searchOnEnter(event)"
  >
  <button onclick="handleSearch()">🔍</button>
  <div id="searchSuggestions" class="search-suggestions"></div>
</div>

  <!-- RIGHT -->
  <div class="nav-right">
  <a href="cart.html">🛒 <span id="cart-count">0</span></a>
</div>

</nav>

<section class="page-hero pro-page-hero">
  <h1>Your Cart</h1>
  <p>Review your selected products</p>
</section>

<section class="section">
  <div class="cart-layout">

    <div id="cart-items" class="cart-items"></div>

    <div class="cart-summary">
      <h2>Order Summary</h2>

      <div class="summary-row">
        <span>Subtotal</span>
        <b>₹<span id="subtotal">0</span></b>
      </div>

      <div class="summary-row">
        <span>Delivery</span>
        <b>₹<span id="delivery">0</span></b>
      </div>

      <div class="summary-row total-row">
        <span>Total</span>
        <b>₹<span id="total">0</span></b>
      </div>

      <button class="checkout-btn" onclick="placeOrder()">Proceed to Checkout</button>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 ElectroShop | Premium Tech Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
