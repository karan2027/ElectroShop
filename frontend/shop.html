<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ElectroShop | Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="main-navbar">

  <!-- LEFT -->
  <div class="nav-left">
  <div class="profile-menu">
    <button type="button" class="profile-icon" onclick="handleProfileClick()">👤</button>

    <div id="profileDropdown" class="profile-dropdown">
      <a href="profile.html">👤 My Profile</a>
      <a href="orders.html">📦 My Orders</a>
      <a href="cart.html">🛒 My Cart</a>
      <button type="button" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="logo"> ElectroShop</div>
</div>

  <!-- CENTER -->
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="shop.html">Shop</a>
    <a href="compare.html">⚖️ Compare</a>
    <a href="orders.html" id="orders-link">My Orders 📦</a>
  </div>
  
  <div class="global-search">
  <input
    type="text"
    id="globalSearch"
    placeholder="Search products..."
    autocomplete="off"
    oninput="showSearchSuggestions()"
    onkeydown="searchOnEnter(event)"
  >
  <button onclick="handleSearch()">🔍</button>
  <div id="searchSuggestions" class="search-suggestions"></div>
</div>

  <!-- RIGHT -->
  <div class="nav-right">
  <a href="cart.html">🛒 <span id="cart-count">0</span></a>
</div>
</nav>

<section class="page-hero pro-page-hero">
  <h1>Start Shopping</h1>
  <p>Select your product category and price range</p>
</section>

<section class="shop-choice-section">
  <div class="shop-choice-box">
    <h2>Choose What You Want to Buy</h2>

    <form id="shopForm" class="shop-form">
      <label>Select Category</label>
      <select id="shopCategory" required>
        <option value="">Choose category</option>
        <option value="mobile">Mobile</option>
        <option value="laptop">Laptop</option>
        <option value="watch">Watch</option>
        <option value="headphone">Headphone</option>
        <option value="airbuds">Airbuds</option>
        <option value="speaker">Speaker</option>
        <option value="charger">Charger</option>
        <option value="gaming">Gaming Items</option>
      </select>

      <label>Select Price Range</label>
      <select id="shopPrice" required>
        <option value="all">All Prices</option>
        <option value="low">Below ₹20,000</option>
        <option value="mid">₹20,000 - ₹60,000</option>
        <option value="high">Above ₹60,000</option>
      </select>

      <button type="submit">Show Products ❯</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2026 ElectroShop | Premium Tech Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
